databaseChangeLog:

  - changeSet:
      id: 001-create-coins
      author: you
      changes:
        - createTable:
            tableName: coins
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: coingecko_id
                  type: varchar(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: symbol
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: image
                  type: varchar(500)
              - column:
                  name: latest_market_data_id
                  type: BIGINT
        - addUniqueConstraint:
            tableName: coins
            columnNames: coingecko_id
            constraintName: uk_coins_coingecko_id

  - changeSet:
      id: 002-create-coin-market-data
      author: you
      changes:
        - createTable:
            tableName: coin_market_data
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: coin_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: current_price
                  type: NUMERIC(20,8)
              - column:
                  name: market_cap
                  type: BIGINT
              - column:
                  name: market_cap_rank
                  type: INTEGER
              - column:
                  name: fully_diluted_valuation
                  type: BIGINT
              - column:
                  name: total_volume
                  type: BIGINT
              - column:
                  name: high_24h
                  type: NUMERIC(20,8)
              - column:
                  name: low_24h
                  type: NUMERIC(20,8)
              - column:
                  name: price_change_24h
                  type: NUMERIC(20,8)
              - column:
                  name: price_change_percentage_24h
                  type: NUMERIC(10,5)
              - column:
                  name: market_cap_change_24h
                  type: BIGINT
              - column:
                  name: market_cap_change_percentage_24h
                  type: NUMERIC(10,5)
              - column:
                  name: circulating_supply
                  type: NUMERIC(20,8)
              - column:
                  name: total_supply
                  type: NUMERIC(20,8)
              - column:
                  name: max_supply
                  type: NUMERIC(20,8)
              - column:
                  name: ath
                  type: NUMERIC(20,8)
              - column:
                  name: ath_change_percentage
                  type: NUMERIC(10,5)
              - column:
                  name: ath_date
                  type: TIMESTAMP
              - column:
                  name: atl
                  type: NUMERIC(20,8)
              - column:
                  name: atl_change_percentage
                  type: NUMERIC(10,5)
              - column:
                  name: atl_date
                  type: TIMESTAMP
              - column:
                  name: last_updated
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: market_cap_rank_with_rehypothecated
                  type: INTEGER
              - column:
                  name: raw_data
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: source
                  type: varchar(500)
                  defaultValue: coingecko

        - addForeignKeyConstraint:
            baseTableName: coin_market_data
            baseColumnNames: coin_id
            referencedTableName: coins
            referencedColumnNames: id
            constraintName: fk_market_coin

        - addUniqueConstraint:
            tableName: coin_market_data
            columnNames: coin_id, last_updated
            constraintName: uq_coin_timestamp

  - changeSet:
      id: 003-indexes
      author: you
      changes:
        - createIndex:
            tableName: coin_market_data
            indexName: idx_market_coin_time
            columns:
              - column:
                  name: coin_id
                constraints:
                    nullable: false
              - column:
                  name: last_updated
                  descending: true

  # ✅ Use raw SQL for check constraints (works everywhere)
  - changeSet:
      id: 004-check-constraints
      author: you
      changes:
        - sql:
            sql: |
              ALTER TABLE coin_market_data
              ADD CONSTRAINT chk_price_positive CHECK (current_price >= 0);

        - sql:
            sql: |
              ALTER TABLE coin_market_data
              ADD CONSTRAINT chk_market_cap_positive CHECK (market_cap >= 0);

  # Optional: categories
  - changeSet:
      id: 005-create-categories
      author: you
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
              - column:
                  name: coingecko_category_id
                  type: varchar(100)
                  constraints:
                    unique: true
              - column:
                  name: name
                  type: varchar(200)

  - changeSet:
      id: 006-coin-category-mapping
      author: you
      changes:
        - createTable:
            tableName: coin_categories
            columns:
              - column:
                  name: coin_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: coin_categories
            columnNames: coin_id, category_id
        - addForeignKeyConstraint:
            baseTableName: coin_categories
            baseColumnNames: coin_id
            referencedTableName: coins
            referencedColumnNames: id
            constraintName: fk_coin_category_coin
        - addForeignKeyConstraint:
            baseTableName: coin_categories
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_coin_category_category